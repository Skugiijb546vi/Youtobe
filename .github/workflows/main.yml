name: YouTube_Final_Ninja

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'لینکی ڤیدیۆکە لێرە دابنێ'
        required: true
      file_name:
        description: 'ناوی فایلەکە (بە safetensors. کۆتایی بێت)'
        required: true
        default: 'movie_final.safetensors'

jobs:
  download_job:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ ئامادەکردنی سێرڤەر
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg nodejs -qq
          # دابەزاندنی تازەترین ڤێرژن کە کێشەیەکانی تێدا چارەسەر کراوە
          pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.zip
          pip install -U huggingface_hub curl_cffi

      - name: 🍪 دانانی ناسنامەکە
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES" > cookies.txt

      - name: ⬇️ داگرتن بە فێڵی مۆبایل و تەلەفزیۆن
        run: |
          echo "خەریکی داگرتنم و خۆم کردووە بە مۆبایل..."
          # لێرەدا پێی دەڵێین کە ئێمە ئەندرۆید و تەلەفزیۆنین بۆ ئەوەی بلۆکمان نەکات
          yt-dlp --cookies cookies.txt --extractor-args "youtube:player_client=android,tv" -f "b" -o "video.mp4" "${{ github.event.inputs.youtube_url }}"

      - name: 🚀 ناردن بۆ کۆگا شاراوەکە
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          repo_id = 'Sarko761/ai-training-data'
          token = os.environ.get('HF_TOKEN')
          original_file_name = '${{ github.event.inputs.file_name }}'
          
          if not (original_file_name.endswith('.safetensors') or original_file_name.endswith('.bin')):
              file_name = original_file_name.split('.')[0] + '.safetensors'
          else:
              file_name = original_file_name
          
          if os.path.exists('video.mp4'):
              api.upload_file(
                  path_or_fileobj='video.mp4',
                  path_in_repo=file_name,
                  repo_id=repo_id,
                  repo_type='dataset',
                  token=token
              )
              print('✅ بە سەرکەوتوویی فڕێنرا!')
              os.remove('video.mp4')
              os.remove('cookies.txt')
          else:
              print('❌ کێشەیەک هەیە، ڤیدیۆکە دانەبەزیوە.')
              exit(1)
          "
