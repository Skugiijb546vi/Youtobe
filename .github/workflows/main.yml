name: YouTube_Cookies_Ninja

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'لینکی یوتیوب لێرە دابنێ'
        required: true
      file_name:
        description: 'ناوی فایلەکە (بە safetensors. کۆتایی بێت)'
        required: true
        default: 'youtube_secret_movie.safetensors'

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ ئامادەکردنی سێرڤەر
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg nodejs -qq
          pip install -q -U yt-dlp huggingface_hub

      - name: 🍪 دروستکردنی ناسنامەی مرۆڤبوون (کووکیس)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES" > cookies.txt
          echo "ناسنامەکە دروست کرا!"

      - name: ⬇️ داگرتن لە یوتیوب بە ناسنامەی ساختەوە
        run: |
          echo "خەریکی هەڵمژینی ڤیدیۆکەم لە یوتیوب..."
          yt-dlp --cookies cookies.txt \
                 -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 --merge-output-format mp4 \
                 --ignore-errors \
                 -o "youtube_video.mp4" \
                 "${{ github.event.inputs.youtube_url }}"
          echo "ڤیدیۆکە بەتەواوی و بێ کێشە داگیرا!"

      - name: 🚀 ناردنی بۆ کۆگا شاراوەکە
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          repo_id = 'Sarko761/ai-training-data'
          token = os.environ.get('HF_TOKEN')
          original_file_name = '${{ github.event.inputs.file_name }}'
          
          if not (original_file_name.endswith('.safetensors') or original_file_name.endswith('.bin')):
              file_name = original_file_name.split('.')[0] + '.safetensors'
          else:
              file_name = original_file_name
          
          if os.path.exists('youtube_video.mp4') and os.path.getsize('youtube_video.mp4') > 0:
              print(f'ناردنی بۆ هوگینگ فەیس بە ناوی: {file_name}')
              api.upload_file(
                  path_or_fileobj='youtube_video.mp4',
                  path_in_repo=file_name,
                  repo_id=repo_id,
                  repo_type='dataset',
                  token=token
              )
              print('✅ فیلمەکە بە سەرکەوتوویی فڕێنرا!')
              os.remove('youtube_video.mp4')
              os.remove('cookies.txt')
          else:
              print('❌ کێشەیەک هەیە، ڤیدیۆکە دانەبەزیوە.')
              exit(1)
          "
