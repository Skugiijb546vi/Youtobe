name: YouTube_Cookie_Simple

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'لینکی یوتیوبەکە لێرە دابنێ'
        required: true
      file_name:
        description: 'ناوی فایلەکە (بە safetensors. کۆتایی بێت)'
        required: true
        default: 'movie_bypassed.safetensors'

jobs:
  download_job:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ ئامادەکردنی سێرڤەر
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg nodejs -qq
          pip install -U yt-dlp huggingface_hub

      - name: 🍪 دروستکردنی ناسنامەی مرۆڤبوون (بۆ شکاندنی بلۆک)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES" > cookies.txt

      - name: ⬇️ داگرتن بەبێ کێشەی ڕۆبۆت
        run: |
          echo "خەریکی داگرتنم بە بەکارهێنانی ناسنامەکە..."
          yt-dlp --cookies cookies.txt -f "best" -o "video.mp4" "${{ github.event.inputs.youtube_url }}"

      - name: 🚀 ناردن بۆ کۆگا
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          repo_id = 'Sarko761/ai-training-data'
          token = os.environ.get('HF_TOKEN')
          original_file_name = '${{ github.event.inputs.file_name }}'
          
          if not (original_file_name.endswith('.safetensors') or original_file_name.endswith('.bin')):
              file_name = original_file_name.split('.')[0] + '.safetensors'
          else:
              file_name = original_file_name
          
          if os.path.exists('video.mp4'):
              api.upload_file(
                  path_or_fileobj='video.mp4',
                  path_in_repo=file_name,
                  repo_id=repo_id,
                  repo_type='dataset',
                  token=token
              )
              print('✅ ڤیدیۆکە بە سەرکەوتوویی نێردرا!')
              os.remove('video.mp4')
              os.remove('cookies.txt')
          else:
              print('❌ کێشەیەک هەیە، ڤیدیۆکە دانەبەزیوە.')
              exit(1)
          "
