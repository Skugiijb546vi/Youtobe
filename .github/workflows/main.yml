name: YouTube_To_HuggingFace_Ninja

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'لینکی ڤیدیۆکە لە یوتیوب لێرە دابنێ'
        required: true
      file_name:
        description: 'ناوی فایلەکە (تکایە بە safetensors. کۆتایی بێت)'
        required: true
        default: 'youtube_movie_v1.safetensors'

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ ئامادەکردنی سێرڤەر و ئامرازەکان
        run: |
          sudo apt-get update -qq
          # لێرەدا nodejs مان زیاد کرد بۆ شکاندنی قوفڵی یوتیوب
          sudo apt-get install -y ffmpeg nodejs -qq
          pip install -U yt-dlp huggingface_hub curl_cffi

      - name: ⬇️ داگرتن لە یوتیوب بە شێوازی شاراوە (وەک ئەندرۆید)
        run: |
          echo "خەریکی ڕاکێشانی ڤیدیۆکەم لە یوتیوبەوە..."
          # بەکارهێنانی فێڵی ئەندرۆید بۆ تێپەڕاندنی بلۆکی یوتیوب
          yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 --merge-output-format mp4 \
                 --extractor-args "youtube:player_client=android,web" \
                 --ignore-errors \
                 -o "youtube_video.mp4" \
                 "${{ github.event.inputs.youtube_url }}"
          echo "داگرتنەکە تەواو بوو!"

      - name: 🚀 شاردنەوە و ناردنی بۆ کۆگاکەمان
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          repo_id = 'Sarko761/ai-training-data'
          token = os.environ.get('HF_TOKEN')
          original_file_name = '${{ github.event.inputs.file_name }}'
          
          if not (original_file_name.endswith('.safetensors') or original_file_name.endswith('.bin')):
              file_name = original_file_name.split('.')[0] + '.safetensors'
          else:
              file_name = original_file_name
          
          print(f'ناردنی ڤیدیۆی یوتیوبەکە بە ناوی شاراوە: {file_name}')
          
          if os.path.exists('youtube_video.mp4') and os.path.getsize('youtube_video.mp4') > 0:
              api.upload_file(
                  path_or_fileobj='youtube_video.mp4',
                  path_in_repo=file_name,
                  repo_id=repo_id,
                  repo_type='dataset',
                  token=token
              )
              print('✅ ڤیدیۆکە بە سەرکەوتوویی گەیشتە کۆگاکە!')
              os.remove('youtube_video.mp4')
          else:
              print('❌ کێشەیەک هەیە، ڤیدیۆکە دانەبەزیوە.')
              exit(1)
          "
