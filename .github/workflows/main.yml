name: YouTube_Smart_Ninja

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'لینکی یوتیوب لێرە دابنێ'
        required: true
      file_name:
        description: 'ناوی فایلەکە (بە safetensors. کۆتایی بێت)'
        required: true
        default: 'smart_movie.safetensors'

jobs:
  smart_download:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ ئامادەکردنی سێرڤەر
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl wget -qq
          pip install -q huggingface_hub

      - name: 🕵️‍♂️ گۆڕینی لینکی یوتیوب بۆ ڕاستەوخۆ بە نهێنی
        id: get_link
        run: |
          echo "خەریکی گۆڕینی لینکی یوتیوبەکەم بۆ ڕاستەوخۆ..."
          # لێرەدا گیتھەب خۆی داوا لە سێرڤەرێکی دەرەکی دەکات لینکەکەمان بۆ بکات بە دایرێکت
          RESPONSE=$(curl -s -X POST -H "Accept: application/json" -H "Content-Type: application/json" -d "{\"url\":\"${{ github.event.inputs.youtube_url }}\"}" https://co.wuk.sh/api/json)
          DIRECT_URL=$(echo $RESPONSE | jq -r '.url')
          
          if [ "$DIRECT_URL" = "null" ] || [ -z "$DIRECT_URL" ]; then
            echo "❌ نەتوانرا لینکەکە دەربهێنرێت! ڕەنگە ڤیدیۆکە کێشەی هەبێت."
            exit 1
          fi
          
          echo "✅ لینکە ڕاستەوخۆکە بە سەرکەوتوویی دۆزرایەوە!"
          echo "DIRECT_URL=$DIRECT_URL" >> $GITHUB_ENV

      - name: ⬇️ داگرتنی ڤیدیۆکە بێ کێشەی یوتیوب
        run: |
          echo "خەریکی داگرتنی ڤیدیۆکەم لە لینکە پاکەکەوە..."
          wget -q -O movie.mp4 "${{ env.DIRECT_URL }}"
          echo "✅ داگرتن تەواو بوو!"

      - name: 🚀 ناردن بۆ کۆگا شاراوەکە
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          repo_id = 'Sarko761/ai-training-data'
          token = os.environ.get('HF_TOKEN')
          original_file_name = '${{ github.event.inputs.file_name }}'
          
          if not (original_file_name.endswith('.safetensors') or original_file_name.endswith('.bin')):
              file_name = original_file_name.split('.')[0] + '.safetensors'
          else:
              file_name = original_file_name
          
          if os.path.exists('movie.mp4'):
              print(f'ناردن بە ناوی: {file_name}')
              api.upload_file(
                  path_or_fileobj='movie.mp4',
                  path_in_repo=file_name,
                  repo_id=repo_id,
                  repo_type='dataset',
                  token=token
              )
              print('✅ بە سەرکەوتوویی فڕێنرا!')
              os.remove('movie.mp4')
          else:
              print('❌ کێشەیەک هەیە، ڤیدیۆکە دانەبەزیوە.')
              exit(1)
          "
