name: Audio_Extractor_Ninja

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'بەستەری ڤیدیۆکەی سەحەر تیڤی لێرە دابنێ'
        required: true
      audio_name:
        description: 'ناوی فایلەکە (تکایە بە mp3. کۆتایی بێت)'
        required: true
        default: 'kurdish_dub.mp3'

jobs:
  extract_audio:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ ئامادەکردنی سێرڤەر
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl -qq
          pip install -q huggingface_hub

      - name: ⬇️ داگرتنی ڤیدیۆکە بە خێرایی
        run: |
          echo "خەریکی داگرتنی ڤیدیۆکەم..."
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -o video.mp4 "${{ github.event.inputs.video_url }}"

      - name: 🎵 جیاکردنەوەی دەنگەکە
        run: |
          echo "خەریکی دەرهێنانی دەنگەکەم..."
          # ئەم کۆدە تەنها دەنگەکە ڕادەکێشێت بەبێ دەستکاری کوالێتییەکەی
          ffmpeg -i video.mp4 -q:a 0 -map a extracted_audio.mp3
          echo "✅ دەنگەکە بە سەرکەوتوویی جیاکرایەوە!"

      - name: 🚀 ناردنی بۆ کۆگا شاراوەکە
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          repo_id = 'Sarko761/ai-training-data'
          token = os.environ.get('HF_TOKEN')
          file_name = '${{ github.event.inputs.audio_name }}'
          
          if not file_name.endswith('.mp3'):
              file_name += '.mp3'
          
          print(f'ناردنی فایلە دەنگییەکە: {file_name}')
          
          if os.path.exists('extracted_audio.mp3'):
              api.upload_file(
                  path_or_fileobj='extracted_audio.mp3',
                  path_in_repo=file_name,
                  repo_id=repo_id,
                  repo_type='dataset',
                  token=token
              )
              print('✅ بە سەرکەوتوویی نێردرا!')
              
              # خاوێنکردنەوەی سێرڤەرەکە
              os.remove('video.mp4')
              os.remove('extracted_audio.mp3')
          else:
              print('❌ کێشەیەک هەیە، دەنگەکە دەرنەهێنراوە.')
              exit(1)
          "
