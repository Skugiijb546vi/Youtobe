name: Direct_Transfer_Ninja

on:
  workflow_dispatch:
    inputs:
      direct_url:
        description: 'لینکە ڕاستەوخۆکەی تێلیگرام (یان هەر سایتێک) لێرە دابنێ'
        required: true
      file_name:
        description: 'ناوی فایلەکە بۆ کۆگاکەت (بە safetensors. کۆتایی بێت)'
        required: true
        default: 'youtube_movie_final.safetensors'

jobs:
  transfer_job:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ ئامادەکردنی سێرڤەر
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget -qq
          pip install -q huggingface_hub

      - name: ⬇️ داگرتنی ڤیدیۆکە لە لینکە ڕاستەوخۆکەوە
        run: |
          echo "خەریکی ڕاکێشانی ڤیدیۆکەم بەبێ هیچ قوفڵێک..."
          wget -q -O downloaded_movie.mp4 "${{ github.event.inputs.direct_url }}"
          echo "داگرتنەکە تەواو بوو!"

      - name: 🚀 ناردنی بۆ هوگینگ فەیس بە ماسکەوە
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          repo_id = 'Sarko761/ai-training-data'
          token = os.environ.get('HF_TOKEN')
          original_file_name = '${{ github.event.inputs.file_name }}'
          
          if not (original_file_name.endswith('.safetensors') or original_file_name.endswith('.bin')):
              file_name = original_file_name.split('.')[0] + '.safetensors'
          else:
              file_name = original_file_name
          
          print(f'ناردنی ڤیدیۆکە بە ناوی شاراوە: {file_name}')
          
          if os.path.exists('downloaded_movie.mp4'):
              api.upload_file(
                  path_or_fileobj='downloaded_movie.mp4',
                  path_in_repo=file_name,
                  repo_id=repo_id,
                  repo_type='dataset',
                  token=token
              )
              print('✅ ڤیدیۆکە بە سەرکەوتوویی گەیشتە کۆگاکە!')
              os.remove('downloaded_movie.mp4')
          else:
              print('❌ کێشەیەک هەیە، ڤیدیۆکە دانەبەزیوە.')
              exit(1)
          "
