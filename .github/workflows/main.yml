name: YouTube_Ultra_Simple

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'لینکەکە لێرە دابنێ'
        required: true
      file_name:
        description: 'ناوی فایلەکە (بە safetensors. کۆتایی بێت)'
        required: true
        default: 'movie_final.safetensors'

jobs:
  download_job:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ ئامادەکردنی سێرڤەر
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg nodejs -qq
          pip install -U yt-dlp huggingface_hub

      - name: ⬇️ داگرتنی ڤیدیۆکە بە فێڵی گۆڕینی هێڵ
        run: |
          echo "خەریکی داگرتنم بە ڕێگا سادەکە..."
          # وشەی زیادت بۆ دانراوە تاوەکو بلۆکەکەی یوتیوب تێپەڕێنێت
          yt-dlp --force-ipv4 --merge-output-format mp4 -o "video.mp4" "${{ github.event.inputs.youtube_url }}"

      - name: 🚀 ناردنی بۆ کۆگاکە
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          repo_id = 'Sarko761/ai-training-data'
          token = os.environ.get('HF_TOKEN')
          original_file_name = '${{ github.event.inputs.file_name }}'
          
          if not (original_file_name.endswith('.safetensors') or original_file_name.endswith('.bin')):
              file_name = original_file_name.split('.')[0] + '.safetensors'
          else:
              file_name = original_file_name
          
          if os.path.exists('video.mp4'):
              api.upload_file(
                  path_or_fileobj='video.mp4',
                  path_in_repo=file_name,
                  repo_id=repo_id,
                  repo_type='dataset',
                  token=token
              )
              print('✅ بە سەرکەوتوویی تەواو بوو!')
              os.remove('video.mp4')
          else:
              print('❌ کێشەیەک هەیە، ڤیدیۆکە دانەبەزیوە.')
              exit(1)
          "
